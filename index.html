<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Maaf Ya</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:380px;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

img{
    width:220px;
    border-radius:15px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

#yes{
    background:#ff5c8a;
    color:white;
}

#no{
    background:#ddd;
    position:fixed;
}
</style>

</head>

<body>

<div class="card">

<h2>🥺 Maaf Ya...</h2>

<img src="kucing.jpg">

<p>
Aku minta maaf ya.<br><br>
Maaf kalau aku bikin kamu takut dan ragu sama aku.<br><br>
Aku bakal buktiin lewat tindakan, bukan cuma kata-kata. ❤️
</p>

<button id="yes">❤️ Iya</button>

<button id="no">😤 Enggak</button>

</div>

<script>

const no=document.getElementById("no");

// posisi awal
no.style.left="220px";
no.style.top="420px";

function kabur(){

const maxX=window.innerWidth-100;
const maxY=window.innerHeight-60;

no.style.left=Math.random()*maxX+"px";
no.style.top=Math.random()*maxY+"px";

}

// HP
no.addEventListener("pointerdown",function(e){

e.preventDefault();

kabur();

});

// PC
no.addEventListener("mouseenter",kabur);

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffd6e7;
font-family:Arial;
text-align:center;
">

<h1>🥹❤️</h1>

<h2>YAYYYY!!</h2>

<p>

Makasih ya udah ngasih aku kesempatan lagi.

<br><br>

Aku janji bakal berubah.

</p>

<img src="kucing2.jpg" width="220" style="border-radius:20px;">

</div>

`;

}

</script>

</body>
</html>
